  <line x1="19.5" y1="19.2" x2="27" y2="20" stroke="rgba(201,150,42,0.5)" stroke-width="0.9" stroke-linecap="round"/>
  <!-- "TurnPage" wordmark -->
  <text x="43" y="25"
