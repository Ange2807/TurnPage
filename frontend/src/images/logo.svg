  <line x1="9" y1="17" x2="16.5" y2="16.2" stroke="rgba(201,150,42,0.5)" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="9" y1="20" x2="16.5" y2="19.2" stroke="rgba(201,150,42,0.5)" stroke-width="0.9" stroke-linecap="round"/>
  <!-- Text lines right page -->
