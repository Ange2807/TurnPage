  <!-- Text lines – left page -->
  <line x1="8" y1="15" x2="14.5" y2="14.3" stroke="rgba(201,150,42,0.5)" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="8" y1="17.6" x2="14.5" y2="16.9" stroke="rgba(201,150,42,0.5)" stroke-width="0.9" stroke-linecap="round"/>
  <!-- Text lines – right page -->
